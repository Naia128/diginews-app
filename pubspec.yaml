name: diginews_app
description: DigiNews App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.9.0

  # State Management
  flutter_bloc: ^9.1.1

  # Dependency Injection
  get_it: ^8.2.0

  # Routing
  go_router: ^17.3.0

  # Local Database
  isar: 3.1.0+1
  isar_flutter_libs: 3.1.0+1

  # Utility
  path_provider: ^2.1.5

  # Animation
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  isar_generator: 3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/